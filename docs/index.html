<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TorqueDen — Legal</title>
<style>
  :root { --ember:#FF6A2B; --ink:#1c1d21; --muted:#5c6068; --line:#e6e7ea; --bg:#ffffff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  header { background:#121418; padding:22px 20px; }
  header .mark { max-width:760px; margin:0 auto; font-weight:800; font-size:26px; letter-spacing:-.02em; }
  header .mark .t { color:#f4efe7; } header .mark .d { color:var(--ember); }
  main { max-width:760px; margin:0 auto; padding:40px 20px 72px; }
  h1 { font-size:28px; margin:0 0 8px; }
  p.lead { color:var(--muted); margin:0 0 28px; }
  a.card { display:block; border:1px solid var(--line); border-radius:14px; padding:18px 20px;
    margin-bottom:12px; text-decoration:none; color:var(--ink); }
  a.card:hover { border-color:var(--ember); }
  a.card .t { font-weight:700; font-size:18px; }
  a.card .d { color:var(--muted); font-size:14px; margin-top:2px; }
  footer { border-top:1px solid var(--line); margin-top:32px; padding-top:20px; color:var(--muted); font-size:13px; }
  a { color:var(--ember); }
</style>
</head>
<body>
<header><div class="mark"><span class="t">Torque</span><span class="d">Den</span></div></header>
<main>
  <h1>Legal &amp; policies</h1>
  <p class="lead">Everything about how TorqueDen works and how we handle your data.</p>
  <a class="card" href="privacy-policy.html"><div class="t">Privacy Policy</div><div class="d">What we collect, why, and your rights.</div></a>
  <a class="card" href="terms-of-service.html"><div class="t">Terms of Service</div><div class="d">The rules for using TorqueDen.</div></a>
  <a class="card" href="community-guidelines.html"><div class="t">Community Guidelines</div><div class="d">What’s welcome — and what isn’t.</div></a>
  <footer>© 2026 TorqueDen · <a href="mailto:support@torqueden.app">support@torqueden.app</a></footer>
</main>
</body>
</html>
